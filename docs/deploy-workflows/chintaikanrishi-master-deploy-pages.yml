# chintaikanrishi-master 用 — .github/workflows/deploy-pages.yml にコピーして push
# PAT に workflow スコープが必要（docs/WORKFLOW_PUSH.md 参照）
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-chintaikanrishi
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Site-specific SPA data
        run: |
          python3 tools/csv_to_chintaikan_eisei_master.py
          python3 tools/glossary_csv_to_eisei_embed_js.py
          python3 tools/csv_to_eisei_ichimon_js.py

      - name: Build, validate, and bundle public_site
        run: python3 tools/build_all.py

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
